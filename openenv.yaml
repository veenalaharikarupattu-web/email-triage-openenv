version: "1.0.0"
name: "email-triage-env"
description: "AI Agent environment for professional email prioritization"
entry_point: "env:EmailTriageEnv"
type: "text-categorization"

# Define the data structure the agent receives
observation_space:
  type: "dict"
  properties:
    unread_count: 
      type: "integer"
    emails: 
      type: "array"
      items:
        type: "object"
    current_status: 
      type: "string"

# Define what the agent can do
action_space:
  type: "dict"
  properties:
    email_id: 
      type: "integer"
    category: 
      type: "string"
      enum: ["Urgent", "Action Required", "Personal", "Spam"]
